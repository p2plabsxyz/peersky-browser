name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run test suites
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          shell: bash
          command: npm run test:p2p && npm run test:p2p:e2e && npm run test:extensions && npm run test:security

      - name: Run integration test (Windows/macOS)
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        run: npm run test:integration
