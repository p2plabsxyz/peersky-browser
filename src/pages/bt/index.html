<!DOCTYPE html>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="peersky://static/assets/favicon.ico" />
<title>BitTorrent</title>
<style>
  @import url("browser://theme/index.css");
  @import url("browser://theme/vars.css");
  @import url("browser://theme/settings.css");

  body {
    margin: 0;
    background: var(--settings-bg-primary);
    color: var(--settings-text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow-y: auto !important;
  }

  .page-wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 2rem;
  }

  html {
    height: 100%;
    overflow-y: auto !important;
  }

  .bt-note {
    margin-top: 0;
  }

  .archive-table td {
    word-break: break-word;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: flex-start;
  }

  .archive-table td .btn,
  .actions .action-link {
    min-width: auto;
    padding: 0.35rem 0.55rem;
    font-size: 0.75rem;
    line-height: 1.2;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }

  .actions .action-link {
    text-decoration: none;
  }

  .actions .action-link:hover {
    text-decoration: none;
  }

  .actions-cell {
    vertical-align: top !important;
  }

  .status-text {
    color: var(--settings-text-secondary);
    font-size: 0.85rem;
  }

  .hash-text {
    font-family: "SF Mono", "Monaco", "Inconsolata", "Fira Code", "Droid Sans Mono", "Source Code Pro", monospace;
    font-size: 0.82rem;
    color: #58a6ff;
  }

  .pager {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    align-items: center;
  }

  .pager-info {
    color: var(--settings-text-secondary);
    font-size: 0.82rem;
  }
</style>
<body>
  <div class="page-wrap">
    <h1 class="section-title">BitTorrent</h1>
    <div class="archive-filter-bar">
      <span class="filter-label">Manager</span>
      <span id="statusLine" class="status-text">Loading…</span>
      <div class="filter-actions">
        <button type="button" id="refreshBtn" class="btn btn-secondary">Refresh</button>
      </div>
    </div>

    <p class="archive-note bt-note">Manage active and cached torrents.</p>

    <table class="archive-table">
      <thead>
        <tr>
          <th style="width: 26%;">Name</th>
          <th style="width: 18%;">Info Hash</th>
          <th style="width: 10%;">State</th>
          <th style="width: 10%;">Progress</th>
          <th style="width: 8%;">Peers</th>
          <th style="width: 28%;">Actions</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="pager">
      <button type="button" id="prevPageBtn" class="btn btn-secondary">Prev</button>
      <span id="pageInfo" class="pager-info">Page 1</span>
      <button type="button" id="nextPageBtn" class="btn btn-secondary">Next</button>
    </div>
  </div>

  <script>
    var apiToken = "";
    var pendingHashes = new Set();
    var pollTimer = null;
    var allTorrents = [];
    var pageSize = 10;
    var currentPage = 1;
    var lastActionMessage = "";

    function formatState(t) {
      if (t.stopped) return "stopped";
      if (t.paused) return "paused";
      if (t.done && t.isSeeding && !t.paused && !t.stopped) return "seeding";
      if (t.done) return "done";
      return "downloading";
    }

    function isActivelySeeding(t) {
      return !!(t && t.done && t.isSeeding && !t.paused && !t.stopped);
    }

    function formatProgress(value) {
      if (typeof value !== "number") return "-";
      return Math.round(value * 100) + "%";
    }

    function renderRows(torrents) {
      var host = document.getElementById("rows");
      host.textContent = "";

      if (!torrents || torrents.length === 0) {
        var row = document.createElement("tr");
        var cell = document.createElement("td");
        cell.colSpan = 6;
        cell.className = "archive-empty";
        cell.textContent = "No torrents found in cache.";
        row.appendChild(cell);
        host.appendChild(row);
        return;
      }

      torrents.forEach(function (t) {
        var row = document.createElement("tr");

        var nameTd = document.createElement("td");
        nameTd.className = "name-cell";
        nameTd.textContent = t.name || "Unknown";
        row.appendChild(nameTd);

        var hashTd = document.createElement("td");
        hashTd.className = "hash-text";
        hashTd.textContent = t.infoHash || "-";
        row.appendChild(hashTd);

        var stateTd = document.createElement("td");
        stateTd.textContent = formatState(t);
        row.appendChild(stateTd);

        var progressTd = document.createElement("td");
        progressTd.textContent = formatProgress(t.progress);
        row.appendChild(progressTd);

        var peersTd = document.createElement("td");
        peersTd.textContent = typeof t.numPeers === "number" ? String(t.numPeers) : "-";
        row.appendChild(peersTd);

        var actionsTd = document.createElement("td");
        actionsTd.className = "actions-cell";
        var actionsWrap = document.createElement("div");
        actionsWrap.className = "actions";

        if (t.infoHash) {
          var openLink = document.createElement("a");
          openLink.href = "bt://" + t.infoHash;
          openLink.textContent = "Open";
          openLink.className = "btn btn-secondary action-link";
          actionsWrap.appendChild(openLink);
        }

        var actionDisabled = pendingHashes.has(t.infoHash);

        if (t.infoHash) {
          if (t.paused) {
            actionsWrap.appendChild(makeActionButton("Resume", t, "resume", actionDisabled));
          } else if (!t.done || t.isSeeding || t.mode === "seed") {
            actionsWrap.appendChild(makeActionButton("Pause", t, "pause", actionDisabled));
          }

          if (t.done && !isActivelySeeding(t)) {
            actionsWrap.appendChild(makeActionButton("Start Seeding", t, "seed", actionDisabled));
          }
          if (isActivelySeeding(t)) {
            actionsWrap.appendChild(makeActionButton("Stop Seeding", t, "unseed", actionDisabled));
          }

          if (!t.done || t.paused || t.isSeeding || t.mode === "seed") {
            actionsWrap.appendChild(makeActionButton("Stop", t, "stop", actionDisabled));
          }

          actionsWrap.appendChild(makeActionButton("Remove", t, "remove", actionDisabled));
          actionsWrap.appendChild(makeCopyButton("Copy Hash", t.infoHash));
          if (t.magnetURI) {
            actionsWrap.appendChild(makeCopyButton("Copy Magnet", t.magnetURI));
          }
        }

        actionsTd.appendChild(actionsWrap);
        row.appendChild(actionsTd);

        host.appendChild(row);
      });
      updatePager();
    }

    function makeActionButton(label, torrent, action, disabled) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = label;
      btn.className = "btn btn-secondary";
      btn.disabled = disabled;
      btn.addEventListener("click", function () {
        runAction(action, torrent);
      });
      return btn;
    }

    function makeCopyButton(label, value) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = label;
      btn.className = "btn btn-secondary";
      btn.addEventListener("click", async function () {
        try {
          await navigator.clipboard.writeText(value);
        } catch (_err) {
          var textArea = document.createElement("textarea");
          textArea.value = value;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand("copy");
          document.body.removeChild(textArea);
        }
      });
      return btn;
    }

    async function getApiToken() {
      var res = await fetch("bt://api?action=api&api=token", { method: "GET" });
      var data = await res.json();
      apiToken = data && data.token ? data.token : "";
      return apiToken;
    }

    async function callApi(action, torrent, retryOnTokenError) {
      var url = "bt://api?action=api&api=" + encodeURIComponent(action);
      if (torrent && torrent.infoHash) {
        url += "&hash=" + encodeURIComponent(torrent.infoHash);
      }
      if (action === "seed" && torrent && torrent.magnetURI) {
        url += "&magnet=" + encodeURIComponent(torrent.magnetURI);
      }
      var options = { method: action === "list" || action === "token" ? "GET" : "POST" };
      if (options.method === "POST" && !apiToken) {
        await getApiToken();
      }
      if (options.method === "POST" && apiToken) {
        options.headers = { "X-BT-Token": apiToken };
      }
      var resp = await fetch(url, options);
      var data = await resp.json();
      if (
        options.method === "POST" &&
        data &&
        data.error === "Forbidden: invalid API token" &&
        retryOnTokenError !== false
      ) {
        await getApiToken();
        return callApi(action, torrent, false);
      }
      return data;
    }

    async function runAction(action, torrent) {
      if (!torrent || !torrent.infoHash) return;
      var statusLine = document.getElementById("statusLine");
      pendingHashes.add(torrent.infoHash);
      try {
        var data = await callApi(action, torrent);
        if (data && data.error) {
          lastActionMessage = "Action failed: " + data.error;
          statusLine.textContent = lastActionMessage;
        } else {
          lastActionMessage = "Updated " + (torrent.name || torrent.infoHash);
          statusLine.textContent = lastActionMessage;
        }
      } catch (_err) {
        lastActionMessage = "Action failed.";
        statusLine.textContent = lastActionMessage;
      } finally {
        pendingHashes.delete(torrent.infoHash);
        await loadList();
      }
    }

    async function loadList() {
      var statusLine = document.getElementById("statusLine");
      try {
        var data = await callApi("list");
        allTorrents = (data && data.torrents) || [];
        var maxPage = Math.max(1, Math.ceil(allTorrents.length / pageSize));
        if (currentPage > maxPage) currentPage = maxPage;
        var start = (currentPage - 1) * pageSize;
        var pageItems = allTorrents.slice(start, start + pageSize);
        renderRows(pageItems);
        var base = allTorrents.length + " torrent" + (allTorrents.length === 1 ? "" : "s");
        statusLine.textContent = lastActionMessage ? (base + " — " + lastActionMessage) : base;
      } catch (_err) {
        renderRows([]);
        statusLine.textContent = "Unable to load torrent list.";
      }
    }

    function updatePager() {
      var maxPage = Math.max(1, Math.ceil(allTorrents.length / pageSize));
      document.getElementById("pageInfo").textContent = "Page " + currentPage + " of " + maxPage;
      document.getElementById("prevPageBtn").disabled = currentPage <= 1;
      document.getElementById("nextPageBtn").disabled = currentPage >= maxPage;
    }

    function gotoPage(nextPage) {
      var maxPage = Math.max(1, Math.ceil(allTorrents.length / pageSize));
      currentPage = Math.min(maxPage, Math.max(1, nextPage));
      var start = (currentPage - 1) * pageSize;
      renderRows(allTorrents.slice(start, start + pageSize));
    }

    async function init() {
      try {
        await getApiToken();
      } catch (_err) {
        apiToken = "";
      }
      await loadList();
      pollTimer = setInterval(loadList, 2000);
      document.getElementById("refreshBtn").addEventListener("click", loadList);
      document.getElementById("prevPageBtn").addEventListener("click", function () {
        gotoPage(currentPage - 1);
      });
      document.getElementById("nextPageBtn").addEventListener("click", function () {
        gotoPage(currentPage + 1);
      });
    }

    init();
  </script>
</body>
