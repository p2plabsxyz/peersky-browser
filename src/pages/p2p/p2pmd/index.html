<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="peersky://static/assets/favicon.ico" />
    <title>P2P Markdown</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <div id="backdrop"></div>
      <div id="loadingSpinner">
        <div class="emoji-loader">↻</div>
      </div>

      <section id="setup-page" class="page">
        <div id="room-panel">
          <div id="setup">
            <button id="create-room" type="button">Create Room</button>
            <div class="connection-options"> 
              <label class="option">
                <input id="privateMode" type="checkbox" />
                <span>Private</span>
              </label>
              <label class="option">
                <input id="udpMode" type="checkbox" />
                <span>UDP</span>
              </label>
              <input id="localHost" type="text" placeholder="Local host (127.0.0.1)" />
              <input id="localPort" type="number" placeholder="Local port (8989)" />
            </div>

            <div class="divider">- or -</div>
            <form id="join-form">
              <input
                id="join-room-key"
                type="text"
                placeholder="Enter hs:// key"
                required
              />
              <button id="join-room" type="submit">Join Room</button>
            </form>
            
            <div id="room-history">
              <div id="room-history-title">Recent Rooms</div>
              <div id="room-history-list"></div>
              <span id="room-history-footer">
                View p2pmd-draft archives in hyperdrive, <a href="peersky://settings/archive" target="_blank">Settings -> Archive</a> for more details
              </span>
            </div>
          </div>
        </div>
      </section>

      <section id="editor-page" class="page hidden">
        <section id="room-panel">
          <div id="room-status" class="hidden">
            <div>Room: <span id="room-key"></span> <span id="copy-room-key" title="Copy room key">⊕</span></div>
            <div>Peers: <span id="peers-count">0</span></div>
            <div>Local URL: <a id="local-url" target="_blank" rel="noopener noreferrer"></a></div>
            <details id="export-menu">
              <summary>Export</summary>
              <div class="export-actions">
                <button id="exportHtmlButton" type="button">Export as HTML</button>
                <button id="exportPdfButton" type="button">Export to PDF</button>
                <button id="exportSlidesButton" type="button">Export as Slides</button>
              </div>
            </details>
            <button id="disconnect-room">Disconnect</button>
          </div>
        </section>

        <section id="editor-panel">
          <div id="editor-left-column">
            <div id="formatting-toolbar">
              <button id="toolbar-bold" class="toolbar-btn" title="Bold (Ctrl/Cmd+B)">
                <span class="toolbar-icon icon-bold"></span>
              </button>
              <button id="toolbar-italic" class="toolbar-btn" title="Italic (Ctrl/Cmd+I)">
                <span class="toolbar-icon icon-italic"></span>
              </button>
              <div class="toolbar-divider"></div>
              <button id="toolbar-h1" class="toolbar-btn" title="Heading 1">
                <span class="toolbar-icon icon-h1"></span>
              </button>
              <button id="toolbar-h2" class="toolbar-btn" title="Heading 2">
                <span class="toolbar-icon icon-h2"></span>
              </button>
              <div class="toolbar-divider"></div>
              <button id="toolbar-ul" class="toolbar-btn" title="Bullet List">
                <span class="toolbar-icon icon-ul"></span>
              </button>
              <button id="toolbar-ol" class="toolbar-btn" title="Numbered List">
                <span class="toolbar-icon icon-ol"></span>
              </button>
              <div class="toolbar-divider"></div>
              <button id="toolbar-link" class="toolbar-btn" title="Insert Link (Ctrl/Cmd+K)">
                <span class="toolbar-icon icon-link"></span>
              </button>
              <button id="toolbar-image" class="toolbar-btn" title="Insert Image">
                <span class="toolbar-icon icon-image"></span>
              </button>
              <div class="toolbar-divider"></div>
              <button id="toolbar-inline-code" class="toolbar-btn" title="Inline Code">
                <span class="toolbar-icon icon-inline-code"></span>
              </button>
              <button id="toolbar-code" class="toolbar-btn" title="Code Block">
                <span class="toolbar-icon icon-code"></span>
              </button>
              <button id="toolbar-quote" class="toolbar-btn" title="Quote">
                <span class="toolbar-icon icon-quote"></span>
              </button>
              <div class="toolbar-divider"></div>
              <button id="viewSlidesButton" class="toolbar-btn" title="View as Slides">
                <span class="toolbar-icon icon-slides"></span>
              </button>
              <button id="fullPreviewButton" class="toolbar-btn hidden" title="Full Screen Preview">
                <span class="toolbar-icon icon-fullscreen"></span>
              </button>
            </div>
            <textarea
              id="markdownInput"
              spellcheck="false"
              placeholder="Write Markdown here"
            ></textarea>
          </div>
          <div id="preview-container">
            <div id="markdownPreview"></div>
            <div id="slidesPreview" class="hidden"></div>
          </div>
        </section>

        <section id="dweb-bottom">
          <section id="dweb-container">
            <div class="publish-controls">
              <label for="protocolSelect">
                <select id="protocolSelect">
                  <option value="hyper" selected>hyper://</option>
                  <option value="ipfs">ipfs://</option>
                </select>
              </label>
              <input id="titleInput" type="text" placeholder="Document title" class="hidden" />
              <button id="publishButton">Publish</button>
              <button id="clearDraftButton">Clear</button>
            </div>
            <div id="ai-toggle-container">
              <button id="toggleAiButton">🤖 Create with AI</button>
            </div>
            <div id="fetchContainer">
              <input id="fetchCidInput" type="text" placeholder="Enter hyper:// or ipfs:// URL" />
              <button id="fetchButton">Fetch</button>
            </div>
          </section>

          <ul id="publishList"></ul>

          <section id="ai-container" class="hidden">
            <textarea id="aiPromptBox" rows="3">
Write a playful README for a moonlight café that serves stardust lattes, with a menu list and a quirky FAQ.</textarea
            >
            <div id="ai-buttons">
              <button id="generateButton">✨ Generate</button>
              <button id="showAiLog">📋 Open Logs</button>
            </div>
          </section>
        </section>

        <dialog id="aiLogDialog">
          <dl id="aiLogs"></dl>
          <button id="closeAiLog">Close</button>
        </dialog>
      </section>
    </main>

    <script src="./lib/markdown-it.min.js"></script>
    <script src="./lib/yjs.min.js"></script>
    <script type="module" src="./common.js"></script>
    <script type="module" src="./noteEditor.js"></script>
    <script type="module" src="./toolbar.js"></script>
    <script type="module" src="./p2p.js"></script>
    <script type="module" src="./ai-generator.js"></script>
  </body>
</html>
